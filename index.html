<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar - Adivina el Planeta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
        }
        .container { max-width: 1200px; margin: 0 auto; }
        button {
            display: block;
            margin: 0 auto 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #4a90d9 0%, #6b5bdf 100%);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(107,91,223,0.4); }
        button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
        .quiz-card {
            max-width: 720px; margin: 0 auto;
            background: rgba(255,255,255,0.1); border-radius: 24px; padding: 30px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }
        .quiz-title { font-size: 1.8rem; margin-bottom: 20px; color: #7eb8ff; text-align: center; }
        .clues-list { list-style: none; display: grid; gap: 12px; margin-bottom: 25px; }
        .clues-list li {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px; padding: 14px 16px;
        }
        .quiz-controls { display: grid; gap: 15px; }
        .quiz-controls label { font-weight: bold; color: rgba(255,255,255,0.85); }
        .quiz-controls select {
            width: 100%; padding: 12px 16px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(10,10,46,0.8);
            color: #fff; font-size: 1rem; outline: none;
        }
        .quiz-controls button { margin-bottom: 0; width: 100%; }
        .result-message { margin-top: 20px; padding: 14px 16px; border-radius: 14px; text-align: center; font-weight: bold; }
        .result-message.success { background: rgba(80,200,120,0.18); border: 1px solid rgba(80,200,120,0.35); }
        .result-message.error   { background: rgba(255,120,120,0.18); border: 1px solid rgba(255,120,120,0.35); }
        .loading { text-align: center; font-size: 1.5rem; color: rgba(255,255,255,0.7); }

        /* Panel jugador */
        .player-panel {
            display: flex; flex-wrap: wrap; justify-content: center;
            align-items: center; gap: 20px; margin-bottom: 28px;
        }
        .player-name-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .player-panel input[type="text"] {
            padding: 10px 20px; font-size: 1rem; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
            color: #fff; width: 220px; outline: none;
        }
        .player-panel input[type="text"]::placeholder { color: rgba(255,255,255,0.5); }
        .player-panel input[type="text"]:focus { border-color: rgba(255,255,255,0.6); }
        .player-hint { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
        .score-display { display: flex; gap: 16px; }
        .score-box {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px; padding: 10px 18px; text-align: center; min-width: 90px;
        }
        .score-label { font-size: 0.72rem; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 1px; }
        .score-value { font-size: 1.6rem; font-weight: bold; color: #7eb8ff; }
        .reset-btn {
            padding: 10px 22px; font-size: 0.9rem;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px; margin: 0;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.18); }

        /* Ranking */
        .ranking-section { max-width: 720px; margin: 30px auto 0; }
        .ranking-section h2 { text-align: center; font-size: 1.3rem; color: rgba(255,255,255,0.8); margin-bottom: 14px; }
        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table th, .ranking-table td {
            padding: 10px 14px; text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.95rem;
        }
        .ranking-table th {
            color: rgba(255,255,255,0.55); font-weight: normal;
            text-transform: uppercase; font-size: 0.72rem; letter-spacing: 1px;
        }
        .ranking-table tbody tr:nth-child(1) td { color: #ffd700; }
        .ranking-table tbody tr:nth-child(2) td { color: #c0c0c0; }
        .ranking-table tbody tr:nth-child(3) td { color: #cd7f32; }
        .clear-btn {
            display: block; margin: 12px auto 0; padding: 8px 22px; font-size: 0.85rem;
            background: rgba(255,80,80,0.2); border: 1px solid rgba(255,80,80,0.35);
            border-radius: 20px; color: rgba(255,180,180,0.9); cursor: pointer; transition: background 0.2s;
        }
        .clear-btn:hover { background: rgba(255,80,80,0.35); box-shadow: none; transform: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪐 Sistema Solar</h1>

        <div class="player-panel">
            <div class="player-name-group">
                <input type="text" id="playerName" placeholder="Tu nombre" maxlength="20" oninput="onPlayerNameChange()">
                <span class="player-hint">Cambia el nombre para cambiar de jugador</span>
            </div>
            <div class="score-display">
                <div class="score-box">
                    <div class="score-label">Puntaje</div>
                    <div class="score-value" id="scoreValue">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Rondas</div>
                    <div class="score-value" id="roundsValue">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Racha</div>
                    <div class="score-value" id="streakValue">0</div>
                </div>
            </div>
            <button class="reset-btn" onclick="resetSession()">↺ Nueva partida</button>
        </div>

        <button onclick="fetchPlanets()">Generar 5 pistas</button>
        <div id="planetsContainer"></div>

        <div class="ranking-section">
            <h2>🏆 Mejores puntajes</h2>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Jugador</th>
                        <th>Mejor puntaje</th>
                        <th>Rondas</th>
                    </tr>
                </thead>
                <tbody id="rankingBody"></tbody>
            </table>
            <button class="clear-btn" onclick="clearRanking()">Borrar ranking</button>
        </div>
    </div>

    <script>
        const API_TOKEN = 'ae887a09-6318-4e2a-bb22-e42d9f14129b';

        let currentPlanet = null;
        let availablePlanets = [];
        let activePlayer = '';

        const session = { score: 0, rounds: 0, streak: 0 };

        // ── Helpers ────────────────────────────────────────────────────────────

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function getPlayerName() {
            return document.getElementById('playerName').value.trim() || 'Anónimo';
        }

        // ── Gestión de jugador ─────────────────────────────────────────────────

        function onPlayerNameChange() {
            const name = getPlayerName();
            if (name !== activePlayer) {
                session.score = 0;
                session.rounds = 0;
                session.streak = 0;
                activePlayer = name;
                updateScoreUI();
            }
        }

        function resetSession() {
            session.score = 0;
            session.rounds = 0;
            session.streak = 0;
            currentPlanet = null;
            updateScoreUI();
            document.getElementById('planetsContainer').innerHTML = '';
        }

        // ── UI puntaje ─────────────────────────────────────────────────────────

        function updateScoreUI() {
            document.getElementById('scoreValue').textContent = session.score;
            document.getElementById('roundsValue').textContent = session.rounds;
            document.getElementById('streakValue').textContent = session.streak;
        }

        // ── Ranking ────────────────────────────────────────────────────────────

        function loadRanking() {
            return JSON.parse(localStorage.getItem('solarRanking') || '[]');
        }

        function saveToRanking() {
            const name = getPlayerName();
            if (session.score === 0) return;

            const ranking = loadRanking();
            const idx = ranking.findIndex(e => e.name === name);

            if (idx >= 0) {
                if (session.score > ranking[idx].score) {
                    ranking[idx].score = session.score;
                    ranking[idx].rounds = session.rounds;
                }
            } else {
                ranking.push({ name, score: session.score, rounds: session.rounds });
            }

            ranking.sort((a, b) => b.score - a.score);
            localStorage.setItem('solarRanking', JSON.stringify(ranking.slice(0, 10)));
            renderRanking();
        }

        function renderRanking() {
            const tbody = document.getElementById('rankingBody');
            const ranking = loadRanking();

            if (ranking.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="color:rgba(255,255,255,0.4);text-align:center;padding:16px">Sin registros aún</td></tr>';
                return;
            }

            const medals = ['🥇', '🥈', '🥉'];
            tbody.innerHTML = ranking.map((entry, i) => `
                <tr>
                    <td>${medals[i] !== undefined ? medals[i] : i + 1}</td>
                    <td>${escapeHtml(entry.name)}</td>
                    <td>${entry.score} pts</td>
                    <td>${entry.rounds}</td>
                </tr>
            `).join('');
        }

        function clearRanking() {
            if (!confirm('¿Borrar todo el ranking?')) return;
            localStorage.removeItem('solarRanking');
            renderRanking();
        }

        // ── API ────────────────────────────────────────────────────────────────

        async function fetchBodies() {
            const headers = { 'authorization': `Bearer ${API_TOKEN}` };
            const urls = [
                'https://api.le-systeme-solaire.net/rest/bodies/',
                'https://corsproxy.io/?https://api.le-systeme-solaire.net/rest/bodies/'
            ];

            let lastError = null;
            for (const url of urls) {
                try {
                    const response = await fetch(url, { headers });
                    if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error('No se pudo consultar la API.');
        }

        async function fetchPlanets() {
            const name = getPlayerName();
            if (name !== activePlayer) {
                session.score = 0;
                session.rounds = 0;
                session.streak = 0;
                activePlayer = name;
                localStorage.setItem('solarPlayerName', name);
                updateScoreUI();
            }

            const container = document.getElementById('planetsContainer');
            container.innerHTML = '<p class="loading">Cargando planetas...</p>';

            try {
                const data = await fetchBodies();
                const planets = data.bodies.filter(body => body.isPlanet === true);

                availablePlanets = [...planets].sort((a, b) =>
                    a.englishName.localeCompare(b.englishName)
                );

                currentPlanet = planets[Math.floor(Math.random() * planets.length)];
                displayQuiz(currentPlanet, availablePlanets);
            } catch (error) {
                container.innerHTML = `<p class="loading">Error: ${escapeHtml(error.message)}</p>`;
            }
        }

        // ── Quiz ───────────────────────────────────────────────────────────────

        function getPlanetClues(planet) {
            return [
                `Soy un ${planet.bodyType || 'cuerpo celeste'} del Sistema Solar.`,
                `Mi eje semi-mayor es ${planet.semimajorAxis ? planet.semimajorAxis.toLocaleString() + ' km' : 'desconocido'}.`,
                `Mi periodo orbital es ${planet.sideralOrbit ? planet.sideralOrbit + ' dias' : 'desconocido'}.`,
                `Mi gravedad es ${planet.gravity ? planet.gravity + ' m/s²' : 'desconocida'}.`,
                `Tengo ${planet.moons ? planet.moons.length : 0} luna(s).`
            ];
        }

        function displayQuiz(planet, planets) {
            const container = document.getElementById('planetsContainer');
            const options = planets.map(item =>
                `<option value="${escapeHtml(item.englishName)}">${escapeHtml(item.englishName)}</option>`
            ).join('');

            const clues = getPlanetClues(planet)
                .map(clue => `<li>${escapeHtml(clue)}</li>`)
                .join('');

            container.innerHTML = `
                <div class="quiz-card">
                    <h2 class="quiz-title">Adivina el planeta</h2>
                    <ul class="clues-list">${clues}</ul>
                    <div class="quiz-controls">
                        <label for="planetSelect">Selecciona el planeta que coincide con las pistas:</label>
                        <select id="planetSelect">
                            <option value="">Elige una opcion</option>
                            ${options}
                        </select>
                        <button onclick="checkAnswer()">Comprobar respuesta</button>
                    </div>
                    <div id="resultMessage"></div>
                </div>
            `;
        }

        function checkAnswer() {
            const select = document.getElementById('planetSelect');
            const result = document.getElementById('resultMessage');

            if (!select.value) {
                result.className = 'result-message error';
                result.textContent = 'Selecciona un planeta antes de comprobar.';
                return;
            }

            if (!currentPlanet) {
                result.className = 'result-message error';
                result.textContent = 'Primero genera una ronda de pistas.';
                return;
            }

            session.rounds++;
            const correct = select.value === currentPlanet.englishName;

            if (correct) {
                const bonus = 10 + session.streak * 2;
                session.score += bonus;
                session.streak++;
                result.className = 'result-message success';
                result.textContent = `¡Correcto! +${bonus} pts${session.streak > 1 ? ' · racha x' + session.streak : ''}. Era ${currentPlanet.englishName}.`;
            } else {
                session.streak = 0;
                result.className = 'result-message error';
                result.textContent = `Incorrecto. La respuesta era ${currentPlanet.englishName}.`;
            }

            updateScoreUI();
            saveToRanking();

            select.disabled = true;
            result.closest('.quiz-card').querySelector('button').disabled = true;
        }

        // ── Inicio ─────────────────────────────────────────────────────────────

        (function init() {
            const saved = localStorage.getItem('solarPlayerName');
            if (saved) {
                document.getElementById('playerName').value = saved;
                activePlayer = saved;
            }
            renderRanking();
        })();
    </script>
</body>
</html>
